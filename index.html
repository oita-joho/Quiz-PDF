<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3択問題PDF作成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card hidden-print">
      <h1>3択問題PDF作成ツール</h1>
      <div class="small">GitHub Pages 用。questions.csv を読み込み、6択から正解を含む3択を自動作成して問題紙と解答紙を作ります。</div>
    </div>

    <div class="card hidden-print">
      <div class="grid">
        <div>
          <label>タイトル</label>
          <input id="titleInput" value="小テストA" />
        </div>
        <div>
          <label>出題問数</label>
          <input id="countInput" type="number" min="1" value="10" />
        </div>
        <div>
          <label>分野番号（カンマ区切り）</label>
          <input id="fieldInput" value="1,2,3" />
        </div>
      </div>
      <div class="grid2" style="margin-top:12px;">
        <div>
          <label>対象ファイル</label>
          <input value="questions.csv" disabled />
          <div class="small">同じフォルダにある questions.csv を読み込みます。</div>
        </div>
        <div>
          <label>操作</label>
          <div class="row">
            <button id="loadBtn">問題を読み込む</button>
            <button id="makeBtn" class="success">10問を作成</button>
            <button id="printQuestionsBtn" class="secondary">問題を印刷/PDF保存</button>
            <button id="printAnswersBtn" class="secondary">解答を印刷/PDF保存</button>
          </div>
        </div>
      </div>
      <div id="status" class="small" style="margin-top:10px;">まだ読み込んでいません。</div>
    </div>

    <div class="card hidden-print">
      <h2>読み込み済み問題一覧</h2>
      <div id="tableBox" class="small">questions.csv を読み込むと表示されます。</div>
    </div>

    <div class="card">
      <h2 class="hidden-print">問題プレビュー</h2>
      <div id="paperArea" class="preview-sheet">
        <div>まだ作成していません。</div>
      </div>
    </div>

    <div class="card">
      <h2 class="hidden-print">解答プレビュー</h2>
      <div id="answerArea" class="preview-sheet">
        <div>まだ作成していません。</div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const tableBox = $("tableBox");
    const paperArea = $("paperArea");
    const answerArea = $("answerArea");

    let allQuestions = [];
    let generated = [];

    $("loadBtn").addEventListener("click", loadCsv);
    $("makeBtn").addEventListener("click", makeQuiz);
    $("printQuestionsBtn").addEventListener("click", () => printMode("questions"));
    $("printAnswersBtn").addEventListener("click", () => printMode("answers"));

    async function loadCsv() {
      try {
        const res = await fetch("./questions.csv?_=" + Date.now());
        if (!res.ok) throw new Error("questions.csv が見つかりません。");
        const text = await res.text();
        allQuestions = parseCsv(text).map(normalizeRow).filter(Boolean);
        renderTable(allQuestions);
        statusEl.textContent = `${allQuestions.length}問を読み込みました。`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "読み込み失敗: " + err.message;
      }
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"'; i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell);
            cell = "";
          } else if (ch === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else if (ch === "\r") {
          } else {
            cell += ch;
          }
        }
      }
      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      const headers = rows.shift() || [];
      return rows.map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = (r[i] || "").trim());
        return obj;
      });
    }

    function normalizeRow(r) {
      const choices = [1,2,3,4,5,6].map(n => (r[`choice${n}`] || "").trim());
      const answerNo = Number(r.answer_no);
      if (!r.question || choices.some(v => !v) || !(answerNo >= 1 && answerNo <= 6)) return null;

      return {
        field_no: String(r.field_no || "").trim(),
        question_no: String(r.question_no || "").trim(),
        question: r.question.trim(),
        choices,
        answerIndex: answerNo - 1
      };
    }

    function renderTable(rows) {
      if (!rows.length) {
        tableBox.innerHTML = "表示できる問題がありません。";
        return;
      }
      tableBox.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>分野番号</th>
              <th>問題番号</th>
              <th>問題文</th>
              <th>正解</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${escapeHtml(r.field_no)}</td>
                <td>${escapeHtml(r.question_no)}</td>
                <td>${escapeHtml(r.question)}</td>
                <td>${escapeHtml(r.choices[r.answerIndex])}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function makeQuiz() {
      if (!allQuestions.length) {
        statusEl.textContent = "先に questions.csv を読み込んでください。";
        return;
      }

      const title = $("titleInput").value.trim() || "小テスト";
      const count = Math.max(1, Number($("countInput").value || 10));
      const fields = $("fieldInput").value.split(",").map(v => v.trim()).filter(Boolean);

      const pool = fields.length
        ? allQuestions.filter(q => fields.includes(q.field_no))
        : [...allQuestions];

      if (pool.length < count) {
        statusEl.textContent = `対象問題が不足しています。現在 ${pool.length}問、必要 ${count}問です。`;
        return;
      }

      generated = shuffle([...pool]).slice(0, count).map((q, i) => buildQuestion(q, i + 1));

      renderPaper(title, generated);
      renderAnswers(title, generated);
      statusEl.textContent = `${title} を ${generated.length}問作成しました。`;
    }

    function buildQuestion(q, no) {
      const wrongIndexes = q.choices.map((_, i) => i).filter(i => i !== q.answerIndex);
      const pickedWrong = shuffle([...wrongIndexes]).slice(0, 2);
      const shownIndexes = shuffle([q.answerIndex, ...pickedWrong]);
      const shownChoices = shownIndexes.map(idx => ({
        originalIndex: idx,
        text: q.choices[idx]
      }));
      const correctDisplayIndex = shownIndexes.indexOf(q.answerIndex);
      return {
        no,
        field_no: q.field_no,
        question_no: q.question_no,
        question: q.question,
        shownChoices,
        correctDisplayIndex,
        correctText: q.choices[q.answerIndex]
      };
    }

    function renderPaper(title, items) {
  const labels = ["ア", "イ", "ウ"];
  paperArea.innerHTML = `
    <h1 style="text-align:center; margin-bottom:6px;">${escapeHtml(title)}</h1>

    <div class="test-info">
      <div class="test-info-row">
        <div>実施日：<span class="test-line" style="min-width:120px;"></span></div>
      </div>
      <div class="test-info-row">
        <div>クラス：<span class="test-line" style="min-width:100px;"></span></div>
        <div>番号：<span class="test-line" style="min-width:70px;"></span></div>
        <div>氏名：<span class="test-line" style="min-width:180px;"></span></div>
        <div>得点：<span class="score-box"></span> 点</div>
      </div>
    </div>

    <div style="text-align:center; margin-bottom:18px;">3択問題　全${items.length}問</div>

    ${items.map(item => `
      <div class="question">
        <div class="answer-row">
          <div class="answer-box"></div>
          <div>
            <strong>${item.no}.</strong>
            [分野${escapeHtml(item.field_no)}]
            ${escapeHtml(item.question)}
          </div>
        </div>

        ${item.shownChoices.map((c, i) => `
          <div class="choice">${labels[i]}　${escapeHtml(c.text)}</div>
        `).join("")}
      </div>
    `).join("")}
  `;
}

    function renderAnswers(title, items) {
      const labels = ["ア", "イ", "ウ"];
      answerArea.innerHTML = `
        <h1 style="text-align:center; margin-bottom:6px;">${escapeHtml(title)} 解答</h1>
        <div style="text-align:center; margin-bottom:18px;">全${items.length}問</div>
        ${items.map(item => `
          <div class="question">
            <div><strong>${item.no}.</strong> [分野${escapeHtml(item.field_no)}] ${escapeHtml(item.question)}</div>
            <div class="answer-line">正解：${labels[item.correctDisplayIndex]}（${escapeHtml(item.correctText)}）</div>
          </div>
        `).join("")}
      `;
    }

    function printMode(mode) {
      if (!generated.length) {
        statusEl.textContent = "先に問題を作成してください。";
        return;
      }
      const paperCard = document.querySelectorAll(".card")[3];
      const answerCard = document.querySelectorAll(".card")[4];
      if (mode === "questions") {
        answerCard.classList.add("hidden-print");
        paperCard.classList.remove("hidden-print");
      } else {
        paperCard.classList.add("hidden-print");
        answerCard.classList.remove("hidden-print");
      }
      window.print();
      paperCard.classList.remove("hidden-print");
      answerCard.classList.remove("hidden-print");
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    loadCsv();
  </script>
</body>
</html>
